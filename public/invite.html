<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Kitchen - BiteBook</title>
  <meta name="description" content="Join a kitchen on BiteBook">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Join Kitchen - BiteBook">
  <meta property="og:description" content="Join a kitchen on BiteBook">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary">
  <meta property="twitter:title" content="Join Kitchen - BiteBook">
  <meta property="twitter:description" content="Join a kitchen on BiteBook">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #F2EDE8 0%, #E7D8C9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #5A6E6C;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: bold;
    }
    
    h1 {
      color: #3E3E3E;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    
    p {
      color: #3E3E3E;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
      opacity: 0.8;
    }
    
    .status {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    
    .status.loading {
      background: #E7D8C9;
      color: #5A6E6C;
    }
    
    .status.error {
      background: #FEE2E2;
      color: #7A2E2A;
    }
    
    .status.success {
      background: #D1FAE5;
      color: #065F46;
    }
    
    .button {
      background: #5A6E6C;
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 16px;
      transition: background 0.2s;
    }
    
    .button:hover {
      background: #4A5E5C;
    }
    
    .button:active {
      transform: scale(0.98);
    }
    
    .button:disabled {
      background: #9CA3AF;
      cursor: not-allowed;
    }
    
    .app-links {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #E7D8C9;
    }
    
    .app-link {
      display: inline-block;
      margin: 8px;
      padding: 12px 24px;
      background: #F2EDE8;
      color: #5A6E6C;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    
    .app-link:hover {
      background: #E7D8C9;
    }
    
    .spinner {
      border: 3px solid #E7D8C9;
      border-top: 3px solid #5A6E6C;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🍳</div>
    <h1>Join Kitchen</h1>
    <p>You've been invited to join a kitchen on BiteBook!</p>
    
    <div id="status" class="status loading">
      <div class="spinner"></div>
      <p style="margin-top: 12px; margin-bottom: 0;">Opening app...</p>
    </div>
    
    <div id="error" class="status error hidden">
      <p id="error-message">Unable to open the app. Please make sure you have the BiteBook app installed.</p>
      <button class="button" onclick="window.location.reload()">Try Again</button>
    </div>
    
    <div id="success" class="status success hidden">
      <p>Successfully opened the app!</p>
    </div>
    
    <div class="app-links">
      <p style="font-size: 14px; margin-bottom: 16px; opacity: 0.7;">Don't have the app?</p>
      <a href="#" id="app-store-link" class="app-link">Download for iOS</a>
      <a href="#" id="play-store-link" class="app-link">Download for Android</a>
    </div>
  </div>
  
  <script>
    // Extract invite ID from URL
    const path = window.location.pathname;
    const inviteMatch = path.match(/\/invite\/([a-zA-Z0-9]+)/);
    const inviteId = inviteMatch ? inviteMatch[1] : null;
    
    if (!inviteId) {
      showError('Invalid invite link');
      return;
    }
    
    // Try to open the app using deep link
    // Use the scheme from app.json (bitebook://)
    const deepLink = `bitebook://invite/${inviteId}`;
    
    // Try to open the app
    function tryOpenApp() {
      // Try bitebook:// (matches app.json)
      window.location.href = deepLink;
      
      // If still not opened after 2 seconds, show error
      setTimeout(() => {
        showError('Unable to open the app. Please make sure you have the BiteBook app installed.');
      }, 2000);
    }
    
    function showError(message) {
      document.getElementById('status').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error-message').textContent = message;
    }
    
    function showSuccess() {
      document.getElementById('status').classList.add('hidden');
      document.getElementById('success').classList.remove('hidden');
    }
    
    // Try to open the app immediately
    tryOpenApp();
    
    // Listen for app focus (if app opens, page will lose focus)
    let hasFocus = true;
    window.addEventListener('blur', () => {
      hasFocus = false;
      setTimeout(() => {
        if (!hasFocus) {
          showSuccess();
        }
      }, 1000);
    });
    
    // Update app store links (replace with actual links when available)
    // document.getElementById('app-store-link').href = 'https://apps.apple.com/app/saute';
    // document.getElementById('play-store-link').href = 'https://play.google.com/store/apps/details?id=com.cgfeletar.bitebook';
  </script>
</body>
</html>
